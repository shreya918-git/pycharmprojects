<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NLP App Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      background-color: #fcecec;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .login-container {
      text-align: center;
    }

    .app-title {
      font-size: 48px;
      margin-bottom: 40px;
      font-weight: 700;
      color: #333;
      letter-spacing: 1px;
    }

    .login-box {
      background-color: #fff;
      padding: 60px 70px;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
      max-width: 520px;
      margin: 0 auto;
      transition: all 0.3s ease-in-out;
    }

    .login-box:hover {
      box-shadow: 0 12px 48px rgba(0, 0, 0, 0.2);
    }

    .login-box h2 {
      margin-bottom: 30px;
      font-size: 28px;
      color: #444;
    }

    form {
      display: flex;
      flex-direction: column;
    }

    label {
      text-align: left;
      margin-bottom: 8px;
      font-weight: 600;
      color: #555;
      font-size: 16px;
    }

    input {
      padding: 14px;
      margin-bottom: 20px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 10px;
      transition: border-color 0.3s ease;
    }

    input:focus {
      border-color: #ff7f7f;
      outline: none;
    }

    button {
      padding: 14px;
      background-color: #ff7f7f;
      border: none;
      color: white;
      font-weight: bold;
      font-size: 17px;
      border-radius: 10px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #ff4d4d;
    }

    .signup-link {
      margin-top: 20px;
      font-size: 15px;
      color: #555;
    }

    .signup-link a {
      color: #ff4d4d;
      text-decoration: none;
      font-weight: 600;
    }

    .signup-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h1 class="app-title">NLP APP</h1>
    <div class="login-box">
      <h2>Login here</h2>
      <form action="/perform_login" method="post">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email" required name="email"/>

        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required name="password"/>

        <button type="submit">Login</button>
      </form>
      <div class="signup-link">
        Don’t have an account? <a href="/signup">Sign up here</a>
      </div>
    </div>
  </div>
</body>
</html>
